<head>
  <meta charset="UTF-8" />

  <meta property="og:title" content="UK Pension Tax Relief Calculator 2025/26" />
  <meta property="og:description" content="See exactly how much tax relief you get on pension contributions at your tax rate." />

<body style="margin:0;background:#f8faff;font-family:'Segoe UI',Arial,sans-serif">
<div id="root"></div>
<script type="text/babel">
//<![CDATA[
const { useState } = React;
function fmt(n){return '£'+Math.round(n).toLocaleString('en-GB');}

function App() {
  const [salary, setSalary] = useState(60000);
  const [contribution, setContribution] = useState(5000);
  const [scheme, setScheme] = useState('relief_at_source'); // or 'net_pay'

  const s = Number(salary)||0;
  const c = Number(contribution)||0;

  // Tax band
  let taxRate = 0;
  if (s > 125140) taxRate = 0.45;
  else if (s > 50270) taxRate = 0.40;
  else if (s > 12570) taxRate = 0.20;

  // Relief at source: you pay net, HMRC adds 20% basic relief
  // Higher/additional rate taxpayers claim extra via self-assessment
  const basicRelief = c * 0.20; // 20% basic always added
  const extraRelief = scheme === 'relief_at_source'
    ? c * Math.max(0, taxRate - 0.20) // higher/additional rate claim extra
    : 0; // net pay: full relief through payroll, no extra claim needed

  const totalRelief = basicRelief + extraRelief;
  const grossContribution = scheme === 'relief_at_source' ? c + basicRelief : c;
  const yourNetCost = c - (scheme === 'relief_at_source' ? 0 : c * taxRate) - extraRelief;
  const netPay = scheme === 'net_pay' ? c : c; // actual cost to you
  const actualCost = scheme === 'relief_at_source'
    ? c * (1 - Math.max(0, taxRate - 0.20)) - (taxRate > 0.20 ? 0 : 0) // simplified
    : c * (1 - taxRate);

  // Simpler cost calc
  const costToYou = scheme === 'relief_at_source'
    ? c - extraRelief // you pay c, claim back extra via SA
    : c * (1 - taxRate); // pre-tax, so effective cost

  return (
    <div style={{maxWidth:520,margin:'0 auto',paddingBottom:40}}>
      <div style={{background:'#1a1a2e',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <a href="https://tabutility.com" style={{color:'#a5b4fc',textDecoration:'none',fontSize:14}}>← All Tools</a>
        <span style={{color:'#fff',fontWeight:700,fontSize:15}}>⚡ Tabutility</span>
      </div>
      <div style={{background:'linear-gradient(135deg,#7c3aed,#6d28d9)',padding:'28px 20px',textAlign:'center',color:'#fff'}}>
        <div style={{fontSize:36,marginBottom:8}}>🏦</div>
        <h1 style={{margin:'0 0 6px',fontSize:22,fontWeight:900}}>UK Pension Tax Relief</h1>
        <p style={{margin:0,fontSize:13,opacity:0.85}}>2025/26 — See how much the government tops up your pension</p>
      </div>
      <div style={{padding:20}}>
        <div style={{background:'#fff',borderRadius:14,padding:20,boxShadow:'0 2px 12px rgba(0,0,0,0.06)',marginBottom:16}}>
          {[['Annual Salary','£',salary,setSalary],['Your Pension Contribution','£',contribution,setContribution]].map(([l,p,v,s])=>(
            <div key={l} style={{marginBottom:14}}>
              <label style={{fontSize:13,fontWeight:600,color:'#374151',display:'block',marginBottom:6}}>{l}</label>
              <div style={{position:'relative'}}>
                <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#6b7280'}}>{p}</span>
                <input type="number" value={v} onChange={e=>s(e.target.value)}
                  style={{width:'100%',padding:'11px 12px 11px 28px',borderRadius:10,border:'2px solid #e5e7eb',fontSize:16,boxSizing:'border-box'}} />
              </div>
            </div>
          ))}
          <div>
            <label style={{fontSize:13,fontWeight:600,color:'#374151',display:'block',marginBottom:8}}>Pension Scheme Type</label>
            <div style={{display:'flex',gap:8}}>
              {[['relief_at_source','Relief at Source'],['net_pay','Net Pay Arrangement']].map(([v,l])=>(
                <button key={v} onClick={()=>setScheme(v)} style={{flex:1,padding:'9px',borderRadius:10,border:`2px solid ${scheme===v?'#7c3aed':'#e5e7eb'}`,background:scheme===v?'#7c3aed':'#fff',color:scheme===v?'#fff':'#374151',fontWeight:600,cursor:'pointer',fontSize:12}}>{l}</button>
              ))}
            </div>
          </div>
        </div>

        <div style={{background:'linear-gradient(135deg,#faf5ff,#ede9fe)',borderRadius:14,padding:24,textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:'#5b21b6'}}>TOTAL TAX RELIEF</div>
          <div style={{fontSize:48,fontWeight:900,color:'#7c3aed',margin:'6px 0'}}>{fmt(totalRelief)}</div>
          <div style={{fontSize:14,color:'#6d28d9'}}>Gross pension pot: <strong>{fmt(grossContribution)}</strong></div>
        </div>

        <div style={{background:'#fff',borderRadius:14,padding:20,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}}>
          {[
            ['Your Salary', fmt(s)],
            ['Tax Rate', (taxRate*100)+'%'],
            ['Your Contribution', fmt(c)],
            ['Basic Rate Relief (20%)', '+'+fmt(basicRelief)],
            ...(extraRelief>0?[['Extra Relief (claim via SA)', '+'+fmt(extraRelief)]]:[]),
            ['Total Relief', fmt(totalRelief)],
            ['Gross Into Pension', fmt(grossContribution)],
            ['Actual Cost to You', fmt(costToYou)],
          ].map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #f0f0f0',fontSize:14}}>
              <span style={{color:'#6b7280'}}>{l}</span><strong style={{color:l.includes('Relief')&&!l.includes('Extra')?'#7c3aed':l.includes('Cost')?'#16a34a':'#1a1a2e'}}>{v}</strong>
            </div>
          ))}
        </div>
        <div style={{background:'#faf5ff',borderRadius:12,padding:16,marginTop:16,fontSize:13,color:'#5b21b6',lineHeight:1.6}}>
          <strong>Annual allowance 2025/26:</strong> £60,000 (or 100% of earnings if lower). Higher rate taxpayers on relief-at-source schemes must claim the extra 20–25% via self-assessment. Net pay arrangements give full relief automatically through payroll.
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
//]]>
</script>
</body>
</html>
