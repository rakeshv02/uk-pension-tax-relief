<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROI Calculator — Return on Investment | Tabutility</title>
  <meta name="description" content="Calculate return on investment (ROI), annualised return, and profit/loss for any investment. Simple and detailed ROI analysis." />
  <meta name="keywords" content="roi calculator, return on investment, investment return, annualised return, profit calculator" />
  <link rel="canonical" href="https://roi.tabutility.com/" />
  <meta property="og:title" content="ROI Calculator — Return on Investment" />
  <meta property="og:description" content="Calculate ROI, annualised return and profit for any investment instantly." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>" />
  <meta name="robots" content="index, follow" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7039091592734005" crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-78VZWJ5B1W"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-78VZWJ5B1W');</script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;background:#f8faff;font-family:'Segoe UI',Arial,sans-serif">
<div id="root"></div>
<script type="text/babel">
//<![CDATA[
const { useState } = React;
function fmt(n){return '$'+Math.abs(Math.round(n)).toLocaleString();}
function fmtPct(n){return (n>=0?'+':'')+n.toFixed(2)+'%';}

function App() {
  const [initial, setInitial] = useState(10000);
  const [final, setFinal] = useState(14500);
  const [years, setYears] = useState(3);
  const [fees, setFees] = useState(0);

  const inv = Number(initial)||0;
  const fin = Number(final)||0;
  const yrs = Number(years)||1;
  const fee = Number(fees)||0;

  const netFinal = fin - fee;
  const profit = netFinal - inv;
  const roi = inv > 0 ? (profit / inv * 100) : 0;
  const annualised = inv > 0 && yrs > 0 ? (Math.pow(netFinal/inv, 1/yrs)-1)*100 : 0;
  const positive = profit >= 0;

  return (
    <div style={{maxWidth:520,margin:'0 auto',paddingBottom:40}}>
      <div style={{background:'#1a1a2e',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <a href="https://tabutility.com" style={{color:'#a5b4fc',textDecoration:'none',fontSize:14}}>← All Tools</a>
        <span style={{color:'#fff',fontWeight:700,fontSize:15}}>⚡ Tabutility</span>
      </div>
      <div style={{background:'linear-gradient(135deg,#0891b2,#0e7490)',padding:'28px 20px',textAlign:'center',color:'#fff'}}>
        <div style={{fontSize:36,marginBottom:8}}>📈</div>
        <h1 style={{margin:'0 0 6px',fontSize:22,fontWeight:900}}>ROI Calculator</h1>
        <p style={{margin:0,fontSize:13,opacity:0.85}}>Return on investment · annualised return · profit/loss</p>
      </div>
      <div style={{padding:20}}>
        <div style={{background:'#fff',borderRadius:14,padding:20,boxShadow:'0 2px 12px rgba(0,0,0,0.06)',marginBottom:16}}>
          {[['Initial Investment','$',initial,setInitial],['Final Value','$',final,setFinal],['Fees / Costs','$',fees,setFees]].map(([label,prefix,val,setter])=>(
            <div key={label} style={{marginBottom:14}}>
              <label style={{fontSize:13,fontWeight:600,color:'#374151',display:'block',marginBottom:6}}>{label}</label>
              <div style={{position:'relative'}}>
                <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#6b7280'}}>{prefix}</span>
                <input type="number" value={val} onChange={e=>setter(e.target.value)}
                  style={{width:'100%',padding:'11px 12px 11px 28px',borderRadius:10,border:'2px solid #e5e7eb',fontSize:16,boxSizing:'border-box'}} />
              </div>
            </div>
          ))}
          <div>
            <label style={{fontSize:13,fontWeight:600,color:'#374151',display:'block',marginBottom:6}}>Investment Period (years)</label>
            <input type="number" value={years} onChange={e=>setYears(e.target.value)} min={0.1} step={0.5}
              style={{width:'100%',padding:'11px 12px',borderRadius:10,border:'2px solid #e5e7eb',fontSize:16,boxSizing:'border-box'}} />
          </div>
        </div>

        <div style={{background: positive?'#f0fdf4':'#fef2f2',borderRadius:14,padding:24,textAlign:'center',marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'#6b7280',marginBottom:4}}>TOTAL ROI</div>
          <div style={{fontSize:52,fontWeight:900,color: positive?'#059669':'#dc2626'}}>{fmtPct(roi)}</div>
          <div style={{fontSize:15,color: positive?'#059669':'#dc2626',fontWeight:700}}>{positive?'+':''}{fmt(profit)} {positive?'profit':'loss'}</div>
        </div>

        <div style={{background:'#fff',borderRadius:14,padding:20,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}}>
          {[
            ['Initial Investment', fmt(inv)],
            ['Final Value (before fees)', fmt(fin)],
            ['Fees / Transaction Costs', fee > 0 ? '-'+fmt(fee) : '$0'],
            ['Net Final Value', fmt(netFinal)],
            ['Net Profit / Loss', (positive?'+':'-')+fmt(profit)],
            ['Total ROI', fmtPct(roi)],
            ['Annualised Return (CAGR)', fmtPct(annualised)+' / yr'],
          ].map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #f0f0f0',fontSize:14}}>
              <span style={{color:'#6b7280'}}>{l}</span>
              <strong style={{color: l.includes('Loss')||l.includes('Fees')&&fee>0?'#dc2626':l.includes('ROI')||l.includes('Profit')||l.includes('CAGR')?positive?'#059669':'#dc2626':'#1a1a2e'}}>{v}</strong>
            </div>
          ))}
        </div>
        <div style={{background:'#ecfeff',borderRadius:12,padding:16,marginTop:16,fontSize:13,color:'#0e7490',lineHeight:1.6}}>
          <strong>CAGR</strong> (Compound Annual Growth Rate) is the annualised ROI — useful when comparing investments held for different time periods.
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
//]]>
</script>
</body>
</html>
